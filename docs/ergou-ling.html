<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务令</title>
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --card-border: #2a2a4a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent-pm: #f0c040;
    --accent-a: #4caf50;
    --accent-w: #42a5f5;
    --accent-h: #ff7043;
    --status-red: #ef4444;
    --status-yellow: #eab308;
    --status-green: #22c55e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .seal {
    display: inline-block;
    border: 3px solid var(--accent-pm);
    border-radius: 12px;
    padding: 16px 40px;
    position: relative;
    box-shadow: 0 0 30px rgba(240, 192, 64, 0.15);
  }
  .seal h1 {
    font-size: 42px;
    font-weight: 900;
    color: var(--accent-pm);
    letter-spacing: 12px;
  }
  .seal .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .refresh-info {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
  }
  .refresh-info .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--status-green);
    margin-right: 4px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Roles */
  .roles {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 24px 0;
  }
  .role-chip {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid;
  }
  .role-pm { color: var(--accent-pm); border-color: var(--accent-pm); background: rgba(240,192,64,0.1); }
  .role-a { color: var(--accent-a); border-color: var(--accent-a); background: rgba(76,175,80,0.1); }
  .role-w { color: var(--accent-w); border-color: var(--accent-w); background: rgba(66,165,245,0.1); }
  .role-h { color: var(--accent-h); border-color: var(--accent-h); background: rgba(255,112,67,0.1); }

  /* Sections */
  .section { margin: 32px auto; max-width: 900px; }
  .section-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count {
    font-size: 13px;
    background: var(--card-border);
    padding: 2px 10px;
    border-radius: 10px;
    color: var(--text-dim);
  }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
    font-size: 14px;
  }

  /* Cards */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
    position: relative;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
  }
  .type-tag {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
  }
  .type-任务 { background: rgba(66,165,245,0.2); color: var(--accent-w); }
  .type-问题 { background: rgba(239,68,68,0.2); color: var(--status-red); }
  .type-通知 { background: rgba(234,179,8,0.2); color: var(--status-yellow); }
  .type-完成 { background: rgba(34,197,94,0.2); color: var(--status-green); }
  .status-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-red { background: rgba(239,68,68,0.15); color: var(--status-red); animation: pulse 2s infinite; }
  .status-yellow { background: rgba(234,179,8,0.15); color: var(--status-yellow); animation: pulse 2s infinite; }
  .status-green { background: rgba(34,197,94,0.15); color: var(--status-green); }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px 16px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .meta-item .label {
    color: var(--text-dim);
    margin-right: 4px;
  }
  .card-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .card-body p { margin-bottom: 8px; }
  .card-body ul { padding-left: 20px; margin-bottom: 8px; }
  .card-body li { margin-bottom: 4px; }
  .card-body code {
    background: rgba(255,255,255,0.08);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: "Cascadia Code", "Fira Code", monospace;
    font-size: 13px;
  }
  .reply {
    margin-top: 12px;
    padding: 10px 14px;
    border-left: 3px solid var(--accent-pm);
    background: rgba(240,192,64,0.05);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    line-height: 1.6;
  }

  .error-box {
    max-width: 600px;
    margin: 80px auto;
    text-align: center;
    padding: 40px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
  }
  .error-box h2 { color: var(--status-red); margin-bottom: 12px; }
  .error-box p { color: var(--text-dim); font-size: 14px; line-height: 1.8; }
  .error-box code { background: rgba(255,255,255,0.08); padding: 2px 8px; border-radius: 3px; }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .seal h1 { font-size: 28px; letter-spacing: 8px; }
    .seal { padding: 12px 24px; }
    .meta-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="seal">
    <h1>任务令</h1>
    <div class="sub">二狗PM 发令 &middot; 各端接令</div>
  </div>
  <div class="refresh-info">
    <span class="dot"></span>
    <span id="refresh-text">加载中...</span>
  </div>
</header>

<div class="roles">
  <span class="role-chip role-pm">二狗PM &middot; 协调中心</span>
  <span class="role-chip role-a">二狗A &middot; Android</span>
  <span class="role-chip role-w">二狗W &middot; Web</span>
  <span class="role-chip role-h">二狗H &middot; 鸿蒙</span>
</div>

<div id="app"></div>

<script>
const REFRESH_INTERVAL = 30;
let countdown = REFRESH_INTERVAL;

async function loadAndRender() {
  try {
    const resp = await fetch('./agent-board.md', { cache: 'no-store' });
    if (!resp.ok) throw new Error(resp.status);
    const text = await resp.text();
    render(parse(text));
    updateRefreshText('刚刚刷新');
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        <h2>无法加载 agent-board.md</h2>
        <p>请确保本文件与 <code>agent-board.md</code> 在同一目录下。<br>
        如果直接双击打开，部分浏览器会阻止本地文件加载。<br>
        可用命令启动本地服务：<br>
        <code>cd docs && python -m http.server 8080</code><br>
        然后访问 <code>http://localhost:8080/ergou-ling.html</code></p>
      </div>`;
  }
}

function parse(text) {
  const sections = text.split(/\n## /);
  const pending = [];
  const completed = [];

  for (const sec of sections) {
    const firstLine = sec.split('\n')[0].trim();
    let target = null;
    if (firstLine === '待接令') target = pending;
    else if (firstLine === '已结令') target = completed;
    else continue;

    const commands = sec.split(/\n### /).slice(1);
    for (const cmd of commands) {
      const parsed = parseCommand(cmd);
      if (parsed) target.push(parsed);
    }
  }
  return { pending, completed };
}

function parseCommand(raw) {
  const lines = raw.split('\n');
  const titleLine = lines[0].trim();
  const typeMatch = titleLine.match(/^\[(.+?)\]\s*(.+)/);
  if (!typeMatch) return null;

  const type = typeMatch[1];
  const title = typeMatch[2];
  const meta = {};
  const bodyLines = [];
  const replies = [];
  let inBody = false;

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    const metaMatch = line.match(/^- \*\*(.+?)\*\*：(.+)/);
    if (metaMatch && !inBody) {
      meta[metaMatch[1]] = metaMatch[2].trim();
    } else if (line.startsWith('> ')) {
      replies.push(line.slice(2));
    } else if (line.trim() === '---') {
      continue;
    } else if (line.trim() !== '' || inBody) {
      inBody = true;
      bodyLines.push(line);
    }
  }

  // Trim trailing empty lines
  while (bodyLines.length && bodyLines[bodyLines.length - 1].trim() === '') bodyLines.pop();

  const statusText = meta['状态'] || '';
  let statusClass = '';
  if (statusText.includes('🔴')) statusClass = 'status-red';
  else if (statusText.includes('🟡')) statusClass = 'status-yellow';
  else if (statusText.includes('🟢')) statusClass = 'status-green';

  return { type, title, meta, body: bodyLines.join('\n'), replies: replies.join('\n'), statusText, statusClass };
}

function renderInlineMarkdown(text) {
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

function renderBody(text) {
  if (!text.trim()) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = false;

  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('- ')) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += '<li>' + renderInlineMarkdown(trimmed.slice(2)) + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (trimmed) html += '<p>' + renderInlineMarkdown(trimmed) + '</p>';
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function render(data) {
  const app = document.getElementById('app');
  app.innerHTML = renderSection('待接令', data.pending) + renderSection('已结令', data.completed);
}

function renderSection(title, commands) {
  const icon = title === '待接令' ? '📜' : '📁';
  let html = `<div class="section">
    <div class="section-title">${icon} ${title} <span class="count">${commands.length}</span></div>`;

  if (commands.length === 0) {
    html += '<div class="empty">（暂无）</div>';
  } else {
    for (const cmd of commands) {
      html += renderCard(cmd);
    }
  }
  html += '</div>';
  return html;
}

function renderCard(cmd) {
  const metaKeys = ['日期', '发令', '接令', '关联'];
  let metaHtml = '';
  for (const key of metaKeys) {
    if (cmd.meta[key]) {
      metaHtml += `<div class="meta-item"><span class="label">${key}:</span>${renderInlineMarkdown(cmd.meta[key])}</div>`;
    }
  }

  let replyHtml = '';
  if (cmd.replies.trim()) {
    replyHtml = `<div class="reply">${renderBody(cmd.replies)}</div>`;
  }

  return `<div class="card">
    <div class="card-header">
      <span class="type-tag type-${cmd.type}">${cmd.type}</span>
      <div class="card-title">${renderInlineMarkdown(cmd.title)}</div>
      <span class="status-badge ${cmd.statusClass}">${cmd.statusText.replace(/[🔴🟡🟢]\s*/, m => m)}</span>
    </div>
    <div class="meta-grid">${metaHtml}</div>
    <div class="card-body">${renderBody(cmd.body)}</div>
    ${replyHtml}
  </div>`;
}

function updateRefreshText(msg) {
  document.getElementById('refresh-text').textContent = msg;
}

// Init
loadAndRender();
setInterval(() => {
  countdown--;
  if (countdown <= 0) {
    countdown = REFRESH_INTERVAL;
    loadAndRender();
  } else {
    updateRefreshText(`${countdown}s 后刷新`);
  }
}, 1000);
</script>

</body>
</html>
